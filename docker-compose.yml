version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: crm_app
    volumes:
      - .:/var/www
    depends_on:
      - mysql

  nginx:
    image: nginx:latest
    container_name: crm_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: crm_mysql
    restart: always
    environment:
      MYSQL_DATABASE: crm
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: crm
      MYSQL_PASSWORD: crm123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  node:
    image: node:18
    container_name: crm_node
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: tail -f /dev/null

volumes:
  mysql_data:
